<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 150" role="img" aria-labelledby="title desc">
  <title id="title">숲 토끼</title>
  <desc id="desc">파스텔 숲의 풀밭에 조용히 앉아 있는 작은 토끼</desc>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faecd9"/>
      <stop offset=".58" stop-color="#f1d2ad"/>
      <stop offset="1" stop-color="#dfb488"/>
    </linearGradient>
    <linearGradient id="ear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5cbc6"/>
      <stop offset="1" stop-color="#dca39c"/>
    </linearGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#efb6ae" stop-opacity=".74"/>
      <stop offset="1" stop-color="#efb6ae" stop-opacity="0"/>
    </radialGradient>
    <filter id="groundSoft" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <ellipse cx="96" cy="133" rx="43" ry="5" fill="#6d9869" opacity=".17" filter="url(#groundSoft)"/>
  <path d="M56 130c17-3 55-4 78-1" fill="none" stroke="#78a66c" stroke-width="3" stroke-linecap="round" opacity=".46"/>

  <g stroke="#967469" stroke-opacity=".72" stroke-linejoin="round" stroke-linecap="round">
    <path d="M65 128c-1-9 3-15 10-20 7-6 18-9 31-8 18 1 31 9 34 23 1 4 0 7-2 10H71c-4-1-6-2-6-5Z" fill="url(#body)" stroke-width="2.8"/>
    <ellipse cx="66" cy="112" rx="19" ry="21" fill="#f2d6b5" stroke-width="2.7"/>
    <circle cx="109" cy="82" r="30" fill="url(#body)" stroke-width="2.8"/>
    <path d="M92 58C85 39 85 18 95 10c10 11 13 29 8 49" fill="#f5d8b8" stroke-width="2.8"/>
    <path d="M112 56c-1-20 7-40 18-45 6 15 2 34-8 51" fill="#f5d8b8" stroke-width="2.8"/>
    <path d="M95 48c-4-13-3-24 1-31 5 8 6 19 4 31" fill="url(#ear)" stroke="none" opacity=".86"/>
    <path d="M117 48c1-13 5-24 11-30 2 9 0 20-6 31" fill="url(#ear)" stroke="none" opacity=".86"/>
    <ellipse cx="127" cy="88" rx="16" ry="13" fill="#f9ead8" stroke="none"/>
    <path d="M96 111c8 3 13 10 14 20" fill="none" stroke-width="2.7"/>
    <path d="M110 128c8-6 18-6 26 0" fill="#f5d9bb" stroke-width="2.7"/>
    <circle cx="55" cy="104" r="12" fill="#fff8ef" stroke-width="2.3"/>
  </g>

  <path d="M82 104c7-5 16-7 25-5" fill="none" stroke="#fff7e9" stroke-width="5" stroke-linecap="round" opacity=".28"/>
  <path d="M94 67c5-5 12-8 19-8" fill="none" stroke="#fff8ed" stroke-width="4" stroke-linecap="round" opacity=".26"/>
  <circle cx="104" cy="78" r="4.1" fill="#514a47"/>
  <circle cx="105.4" cy="76.6" r="1.25" fill="#fff" opacity=".94"/>
  <ellipse cx="135" cy="87" rx="4.1" ry="3" fill="#735953"/>
  <path d="M136 91c-2 3-5 4-8 4" fill="none" stroke="#856b63" stroke-width="1.8" stroke-linecap="round"/>
  <ellipse cx="118" cy="93" rx="12" ry="8" fill="url(#cheek)" opacity=".48"/>

  <!-- 앞쪽 풀잎이 발을 살짝 가려 PNG가 아니라 땅 위에 앉아 있는 깊이감을 만듭니다. -->
  <g fill="none" stroke="#6f9e68" stroke-linecap="round" opacity=".64">
    <path d="M101 135c0-7 1-11 5-15" stroke-width="2.4"/>
    <path d="M108 135c-1-6-4-10-7-13" stroke-width="2.1"/>
    <path d="M126 135c0-6 3-10 7-13" stroke-width="2.3"/>
    <path d="M132 135c0-5-1-8-4-11" stroke-width="1.9"/>
  </g>
</svg>
