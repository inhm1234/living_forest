<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 145" role="img" aria-labelledby="title desc">
  <title id="title">냄새를 맡는 숲 고슴도치</title>
  <desc id="desc">몸을 낮추고 코를 앞으로 내밀어 풀밭의 냄새를 맡는 작은 고슴도치</desc>
  <defs>
