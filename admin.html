<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#eef1ff" />
  <title>오늘의숲 · 운영 통계</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="stats-shell">
    <header class="stats-header">
      <div>
        <p class="eyebrow">TODAYFOREST · OPERATION</p>
        <h1>운영 통계</h1>
        <p class="header-copy">개인 식별 정보 없이, 오늘의숲의 세 가지 핵심 흐름만 확인해요.</p>
      </div>
      <button type="button" id="refreshButton" class="refresh-button">새로고침</button>
    </header>

    <section class="range-row" aria-label="기간 선택">
      <button type="button" class="range-button selected" data-range="all">전체</button>
      <button type="button" class="range-button" data-range="today">오늘</button>
      <button type="button" class="range-button" data-range="last7">최근 7일</button>
    </section>

    <p class="status-line" id="statusLine" role="status">통계를 불러오는 중이에요.</p>

    <section class="metric-grid" aria-live="polite">
      <article class="metric-card">
        <span class="metric-icon" aria-hidden="true">🌱</span>
        <p>오늘 마음 남김</p>
        <strong id="moodCount">–</strong>
      </article>
      <article class="metric-card">
        <span class="metric-icon" aria-hidden="true">✉️</span>
        <p>친구에게 편지 보냄</p>
        <strong id="letterCount">–</strong>
      </article>
      <article class="metric-card">
        <span class="metric-icon" aria-hidden="true">🌿</span>
        <p>친구 연결됨</p>
        <strong id="friendCount">–</strong>
      </article>
    </section>

    <section class="note-card">
      <b>이 페이지는 운영 확인용이에요.</b>
      <p>카카오 닉네임, 나무 이름, 계정 ID, 편지 제목·본문은 이 통계에 저장하지 않아요.</p>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
